name: Plugin Check

on:
  workflow_call:
    inputs:
      php-version:
        description: PHP version
        type: string
        default: "8.4"
      wp-version:
        description: WordPress version to test against
        type: string
        default: latest
      build-first:
        description: Run `npm ci && npm run build` before checking
        type: boolean
        default: false
      categories:
        description: Plugin Check categories (comma-separated)
        type: string
        default: plugin_repo
      exclude-directories:
        description: Directories to exclude from checks (comma or newline separated)
        type: string
        default: ""
      exclude-files:
        description: Files to exclude from checks (comma or newline separated)
        type: string
        default: ""
    secrets:
      composer_auth_token:
        description: >-
          Token with read access to private Composer VCS dependencies
          (a GitHub App installation token or a fine-grained PAT with
          contents:read). Optional; when unset, only public packages resolve.
        required: false

jobs:
  check:
    name: Plugin Check (WP ${{ inputs.wp-version }} / PHP ${{ inputs.php-version }})
    runs-on: ubuntu-latest
    env:
      # plugin-check runs the plugin under @wordpress/env, which overwrites any
      # repo .wp-env.json and otherwise defaults to an older PHP. This env var
      # is wp-env's documented override, so a plugin that "Requires PHP" a newer
      # version can still activate and be checked.
      WP_ENV_PHP_VERSION: ${{ inputs.php-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Set up Node
        if: ${{ inputs.build-first }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build
        if: ${{ inputs.build-first }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Authenticate Composer for private dependencies
        env:
          COMPOSER_AUTH_TOKEN: ${{ secrets.composer_auth_token }}
        run: |
          if [ -n "$COMPOSER_AUTH_TOKEN" ]; then
            composer config --global --auth github-oauth.github.com "$COMPOSER_AUTH_TOKEN"
          else
            echo "::notice::No composer_auth_token secret set; only public packages will resolve."
          fi

      - name: Install runtime dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-dev --no-interaction --no-progress --optimize-autoloader
          else
            echo "::notice::No composer.json; skipping dependency install."
          fi

      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        with:
          wp-version: ${{ inputs.wp-version }}
          categories: ${{ inputs.categories }}
          exclude-directories: ${{ inputs.exclude-directories }}
          exclude-files: ${{ inputs.exclude-files }}
