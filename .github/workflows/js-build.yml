name: JS build

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version
        type: string
        default: "22"
      build-dir:
        description: Directory that must exist after build
        type: string
        default: build
      build-command:
        description: npm script to run
        type: string
        default: build

jobs:
  build:
    name: Build (Node ${{ inputs.node-version }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run ${{ inputs.build-command }}

      - name: Assert build artifact exists
        run: |
          if [ ! -d "${{ inputs.build-dir }}" ]; then
            echo "::error::Build did not produce ${{ inputs.build-dir }}/"
            exit 1
          fi
          if [ -z "$(ls -A "${{ inputs.build-dir }}")" ]; then
            echo "::error::${{ inputs.build-dir }}/ is empty"
            exit 1
          fi
          echo "::notice::Build artifact present at ${{ inputs.build-dir }}/"
