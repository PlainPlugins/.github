name: Plugin Release

on:
  workflow_call:
    inputs:
      php-version:
        description: PHP version
        type: string
        default: "8.4"
      node-version:
        description: Node version
        type: string
        default: "22"
      run-node-build:
        description: Run npm ci before the release build
        type: boolean
        default: false
      build-command:
        description: Composer command that creates release zips
        type: string
        default: build:release
    secrets:
      PLAINPLUGINS_BUILD_TOOLS_SSH_KEY:
        required: true

jobs:
  release:
    name: Build release zips
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up build tools SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLAINPLUGINS_BUILD_TOOLS_SSH_KEY }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: zip
          coverage: none
          tools: composer:v2

      - name: Set up Node
        if: ${{ inputs.run-node-build }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-release-${{ inputs.php-version }}-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: composer-release-${{ inputs.php-version }}-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-source

      - name: Install Node dependencies
        if: ${{ inputs.run-node-build }}
        run: npm ci

      - name: Build release zips
        run: composer ${{ inputs.build-command }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zips
          path: build/*.zip

      - name: Attach zips to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.zip
